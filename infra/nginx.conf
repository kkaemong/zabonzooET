user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Backend API Server
    upstream backend_api {
        server backend:8080;
    }

    # ── HTTP: redirect to HTTPS + certbot challenge ──
    server {
        listen       80;
        server_name  _;

        # Certbot ACME challenge (인증서 발급/갱신용)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check (HTTPS 전환 전에도 동작)
        location /health {
            return 200 'healthy\n';
        }

        # 나머지 요청은 HTTPS로 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: SSL termination + reverse proxy ──
    # NOTE: 이 블록은 certbot 인증서 발급 후 활성화합니다.
    #       최초 배포 시에는 아래 include를 주석 처리하고 HTTP만 사용하세요.
    #       인증서 발급 후 주석을 해제하고 nginx reload 하세요.
    include /etc/nginx/conf.d/ssl.conf;
}
