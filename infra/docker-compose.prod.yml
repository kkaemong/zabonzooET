version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: amagetdon-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - amagetdon-network

  backend:
    image: ${IMAGE_TAG:-amagetdon-backend:latest}
    container_name: amagetdon-backend
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - SPRING_REDIS_HOST=${SPRING_REDIS_HOST:-redis}
      - SPRING_REDIS_PORT=${SPRING_REDIS_PORT:-6379}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      - redis
    networks:
      - amagetdon-network

  redis:
    image: redis:7
    container_name: amagetdon-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - amagetdon-network

volumes:
  redis_data:

networks:
  amagetdon-network:
    driver: bridge
