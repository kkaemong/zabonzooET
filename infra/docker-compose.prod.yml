services:
  nginx:
    image: nginx:alpine
    container_name: amagetdon-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - letsencrypt_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_started
    networks:
      - amagetdon-network

  backend:
    image: ${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: amagetdon-backend
    restart: always
    env_file:
      - .env.prod
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - amagetdon-network

  redis:
    image: redis:7
    container_name: amagetdon-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - amagetdon-network

volumes:
  redis_data:
  letsencrypt_certs:
  certbot_webroot:


networks:
  amagetdon-network:
    driver: bridge
