services:
  nginx:
    image: nginx:1.27-alpine
    container_name: monet-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - letsencrypt_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - monet-network

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    container_name: monet-frontend
    restart: always
    networks:
      - monet-network

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: monet-backend
    restart: always
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monet-network

  postgres:
    image: postgres:17-alpine
    container_name: monet-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monet}
      POSTGRES_USER: ${POSTGRES_USER:-monet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      TZ: Asia/Seoul
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monet} -d ${POSTGRES_DB:-monet}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - monet-network

  redis:
    image: redis:7-alpine
    container_name: monet-redis
    restart: always
    profiles: ["redis"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - monet-network

volumes:
  pgdata:
  redisdata:
  letsencrypt_certs:
  certbot_webroot:

networks:
  monet-network:
    driver: bridge
