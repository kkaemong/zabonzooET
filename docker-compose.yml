services:
  postgres:
    image: postgres:17
    container_name: local-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-amagetdon}
      POSTGRES_USER: ${POSTGRES_USER:-A507}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      TZ: Asia/Seoul
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-A507} -d ${POSTGRES_DB:-amagetdon}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: local-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata: