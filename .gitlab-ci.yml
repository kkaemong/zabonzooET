stages:
  - validate
  - deploy

validate_infra:
  stage: validate
  image: alpine:latest
  rules:
    - changes:
        - infra/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - apk add --no-cache bash
    - bash -n infra/scripts/deploy.sh
    - test -f infra/docker-compose.prod.yml
    - test -f infra/nginx.conf

deploy_prod:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  before_script:
    - 'command -v ssh-agent >/dev/null || ( apk add --update openssh )'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $EC2_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - |
      ssh $EC2_USER@$EC2_IP \
      "cd /home/$EC2_USER/amagetdon/S14P21A507 && ./infra/scripts/deploy.sh '$DEPLOY_BACKEND_IMAGE' '$DEPLOY_FRONTEND_IMAGE'"
