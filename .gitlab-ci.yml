stages:
  - test
  - build
  - scan
  - deploy

default:
  image: eclipse-temurin:17-jdk
  before_script:
    - cd BE
    - chmod +x gradlew
  cache:
    key: gradle-cache
    paths:
      - BE/.gradle/

be_test:
  stage: test
  rules:
    - changes:
        - BE/**/*
        - infra/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - ./gradlew test --no-daemon
  artifacts:
    when: always
    paths:
      - BE/build/reports/tests/
      - BE/build/test-results/
    expire_in: 7 days

be_build:
  stage: build
  needs: ["be_test"]
  rules:
    - changes:
        - BE/**/*
        - infra/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - ./gradlew clean bootJar -x test --no-daemon
  artifacts:
    paths:
      - BE/build/libs/*.jar
    expire_in: 7 days

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE/backend
  # Required CI/CD Variables to set in GitLab:
  # - SSH_PRIVATE_KEY
  # - EC2_IP
  # - EC2_USER
  # - AWS_SECRET_ID (optional but recommended for deploy.sh)
  # - AWS_REGION (optional, default: ap-northeast-2)
  # - CI_REGISTRY_IMAGE / CI_REGISTRY_USER / CI_REGISTRY_PASSWORD

container_scan:
  stage: scan
  needs: ["docker_build"]
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  allow_failure: true
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - echo "[scan] Pulling image for scanning..."
    - docker pull $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
    - echo "[scan] Running Trivy container scan (HIGH, CRITICAL)..."
    - trivy image --severity HIGH,CRITICAL --format json --output trivy-report.json $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
    - trivy image --severity HIGH,CRITICAL --exit-code 0 $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
  artifacts:
    when: always
    paths:
      - trivy-report.json
    expire_in: 30 days

docker_build:
  stage: build
  needs: ["be_build"]
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker build -f infra/Dockerfile -t $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_IMAGE:latest

deploy_prod:
  stage: deploy
  needs: ["docker_build"]
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  before_script:
    - 'command -v ssh-agent >/dev/null || ( apk add --update openssh )'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $EC2_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - echo "Deploying to EC2..."
    - ssh $EC2_USER@$EC2_IP "cd /home/$EC2_USER/amagetdon/infra && AWS_SECRET_ID='${AWS_SECRET_ID:-}' AWS_REGION='${AWS_REGION:-ap-northeast-2}' ./deploy.sh $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
